name: Sync README

on:
  push:
    paths:
      - projects.json

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.1.0

      - run:
          uv run scripts/sync_readme.py --json projects.json --template README.md.j2 --output
          README.md

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync README from projects.json'
          file_pattern: README.md
